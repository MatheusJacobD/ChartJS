<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
       body {
        display: flex;
        align-items: center;    
        gap: 40px;             
        padding: 20px;
    }

    .chart-container {
        width: 80%;      
        height: 400px;     
    }
    </style>
</head>
<body>
    <div>
        <canvas id="myChart"></canvas>
    </div>
    
    <div>
        <canvas id="myChart2"></canvas>
    </div>
</body>
<script>
  const ctx = document.getElementById('myChart');
  const ctx2 = document.getElementById('myChart2');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
      datasets: [{
        label: 'Umidade',
        borderColor: '#4E9AC9',
        backgroundColor: '#4E9AC9',
        data: [80, 82, 80, 85, 80, 83],
        borderWidth: 5
      },
    {
              label: 'Temperatura',
              data: [30, 29, 28, 25, 22, 23], 
              borderColor: '#FC81A0', 
              backgroundColor: '#FC81A0',
              borderWidth: 5
            }    
    ]
    },
    options: {
      scales: {
        y: {
          beginAtZero: false
        }
      }
    }
  });

  new Chart(ctx2,{
    type: 'bar',
    data: {
      labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
      datasets: [{
        label: 'Temperatura Média',
        borderColor: '#FC81A0', 
        backgroundColor: '#FC81A0',
        data: [22, 24, 27, 23, 20, 18],
        borderWidth: 5
      },
    {
              label: 'Umidade Média',
              data: [90, 89, 93, 87, 88, 82], 
              borderColor: '#4E9AC9',
              backgroundColor: '#4E9AC9',
              borderWidth: 2
            }    
    ]
    },
    options: {
    scales: {
      y: {
        beginAtZero: true
      }
    }
  },
});
</script>

</html>
